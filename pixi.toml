[workspace]
name = "lidar_cam_fusion"
version = "0.1.0"
description = "LiDAR-Camera Fusion Pipeline using ROS 2 and KITTI dataset"
channels = [
    "robostack-humble",
    "conda-forge",
]
platforms = ["osx-arm64", "linux-64"]

[tasks]
build    = "colcon build --symlink-install --packages-select perception_pipeline"
launch   = "ros2 launch perception_pipeline fusion_pipeline.launch.py"
play-bag = "ros2 bag play $BAG_PATH --loop"

[dependencies]
# ROS 2 Humble — RoboStack requires Python 3.9 on Humble
python = "3.9.*"
ros-humble-ros-base = "*"
ros-humble-sensor-msgs = "*"
ros-humble-vision-msgs = "*"
ros-humble-tf2-ros = "*"
ros-humble-message-filters = "*"
ros-humble-visualization-msgs = "*"
ros-humble-rosbag2-py = "*"
ros-humble-rosbag2-storage-default-plugins = "*"
colcon-common-extensions = "*"

# Core numerics (conda-forge, Python 3.9 compatible)
numpy = ">=1.24,<2.0"
pyyaml = "*"
scipy = "*"

[pypi-dependencies]
# ML / vision stack — installed via pip (avoids opencv/cv-bridge conda conflicts)
opencv-python = ">=4.7"
open3d = ">=0.17"
ultralytics = ">=8.0"

[activation]
scripts = ["scripts/activate_ros.sh"]
