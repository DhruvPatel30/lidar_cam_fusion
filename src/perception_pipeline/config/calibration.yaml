# KITTI calibration parameters — Sequence 00 (left grayscale camera)
# Replace with values from your specific KITTI sequence's calib_cam_to_cam.txt
# and calib_velo_to_cam.txt files.

camera:
  # Intrinsic matrix K (3x3, row-major)
  # From calib_cam_to_cam.txt -> P2 (left color camera)
  # P2 includes a rectification offset; extract K from the first 3x3 block.
  fx: 721.5377
  fy: 721.5377
  cx: 609.5593
  cy: 172.8540
  width: 1242
  height: 375

  # Full 3x4 projection matrix P2 (for direct use)
  P: [721.5377,   0.0,      609.5593, 44.85728,
        0.0,    721.5377,  172.8540,   0.2163791,
        0.0,      0.0,        1.0,     0.002745884]

lidar_to_camera:
  # Extrinsic: transforms a point from Velodyne frame → rectified camera frame
  # Derived from calib_velo_to_cam.txt (R, T) composed with R_rect_00
  # Row-major 4x4 homogeneous matrix
  T: [ 7.533745e-03, -9.999714e-01, -6.166020e-04, -4.069766e-03,
       1.480249e-02,  7.280733e-04, -9.998902e-01, -7.631618e-02,
       9.998621e-01,  7.523790e-03,  1.480755e-02, -2.717806e-01,
       0.0,           0.0,           0.0,            1.0          ]

fusion:
  # Max depth of LiDAR points to consider (meters)
  max_depth: 50.0
  # Min number of points inside a frustum to form a 3D detection
  min_cluster_points: 5
